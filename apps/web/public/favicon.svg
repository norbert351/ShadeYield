          stroke="url(#sy-logo-grad)" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"
          transform="rotate(90 50 50)" class="opacity-95"/>
    <path d="M 38,38 C 38,26 62,26 62,38 C 62,50 38,50 38,62 C 38,74 62,74 62,62"
          stroke="url(#sy-logo-grad)" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"
          transform="rotate(180 50 50)" class="opacity-95"/>
    <path d="M 38,38 C 38,26 62,26 62,38 C 62,50 38,50 38,62 C 38,74 62,74 62,62"
          stroke="url(#sy-logo-grad)" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"
          transform="rotate(270 50 50)" class="opacity-95"/>
